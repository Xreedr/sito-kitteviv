<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyStream — Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/watch.css">
</head>
<body>

<header>
  <a class="back-btn" href="home.html">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    <span id="lbl-back"></span>
  </a>
  <a class="logo" href="home.html">MYSTREAM</a>
  <div class="now-playing">
    <div class="now-playing-title" id="np-title">Loading...</div>
    <div class="now-playing-sub" id="np-sub"></div>
  </div>
</header>

<div class="wrap">
  <div class="player-section">
    <div class="player-inner">
      <div class="player-loading" id="player-loading">
        <div class="spinner"></div>
        <p id="lbl-loading"></p>
      </div>
      <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
      <button id="next-ep-overlay" onclick="goNextEpisode()" style="
        display:none;
        position:absolute;
        bottom:70px;
        right:20px;
        z-index:10;
        background:rgba(0,0,0,0.85);
        border:1px solid rgba(229,9,20,0.5);
        border-radius:8px;
        color:#fff;
        font-family:'DM Sans',sans-serif;
        font-size:0.85rem;
        font-weight:500;
        padding:10px 18px;
        cursor:pointer;
        display:none;
        align-items:center;
        gap:8px;
        transition:background 0.2s, border-color 0.2s;
        backdrop-filter:blur(4px);
      ">
        <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/><rect x="17" y="5" width="2" height="14" rx="1"/></svg>
      </button>
    </div>
  </div>

  <div class="content-section">
    <div class="media-info">
      <div class="media-poster" id="media-poster" style="display:none">
        <img id="media-poster-img" src="" alt="">
      </div>
      <div class="media-details">
        <div class="media-title" id="media-title">-</div>
        <div class="media-meta" id="media-meta"></div>
        <div class="media-desc" id="media-desc"></div>
      </div>
    </div>
    
    <button class="next-ep-btn" id="next-ep-btn" onclick="goNextEpisode()">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/><rect x="17" y="5" width="2" height="14" rx="1"/></svg>
      <span id="lbl-next-ep"></span>
    </button>
    
    <div class="source-row">
       <span class="source-label" id="lbl-source"></span>
      <button class="source-btn active" onclick="switchSource(0, this)">VixSrc</button>
      <button class="source-btn" onclick="switchSource(1, this)">Fonte 2</button>
      <button class="source-btn" onclick="switchSource(2, this)">Fonte 3</button>
    </div>

    <div class="episodes-section" id="episodes-section">
      <div class="ep-header">
        <span class="ep-header-title" id="lbl-episodes"></span>
        <select class="season-select" id="season-sel" onchange="changeSeason(this.value)"></select>
      </div>
      <div class="episodes-list" id="episodes-list"></div>
    </div>
  </div>
</div>

<script type="module" src="js/watch.js"></script>
</body>
</html>
