<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStream — Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e50914;
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --text: #e5e5e5;
    --muted: #757575;
    --header-h: 56px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    padding: 0 22px;
    gap: 18px;
    z-index: 100;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }
 
  .back-btn:hover { color: var(--text); }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--red);
    letter-spacing: 3px;
    text-decoration: none;
    text-shadow: 0 0 15px rgba(229,9,20,0.4);
    flex-shrink: 0;
  }
  .now-playing { flex: 1; overflow: hidden; }
  .now-playing-title {
    font-weight: 500;
    font-size: 0.92rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .now-playing-sub { font-size: 0.73rem; color: var(--muted); margin-top: 1px; }

  .wrap { padding-top: var(--header-h); min-height: 100vh; display: flex; flex-direction: column; }

  .player-section { background: #000; display: flex; align-items: center; justify-content: center; }
  .player-inner { width: 100%; max-width: 1200px; aspect-ratio: 16/9; position: relative; background: #000; }
  .player-inner iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }
  .player-loading {
    position: absolute; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 5; pointer-events: none;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(229,9,20,0.2);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-loading p { font-size: 0.82rem; color: var(--muted); }

  .content-section { padding: 28px 24px 60px; max-width: 1200px; margin: 0 auto; width: 100%; }
  .media-info { display: flex; gap: 20px; margin-bottom: 32px; align-items: flex-start; }
  .media-poster { width: 100px; flex-shrink: 0; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
  .media-poster img { width: 100%; display: block; }
  .media-details { flex: 1; }
  .media-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 1.5px; margin-bottom: 6px; }
  .media-meta { font-size: 0.8rem; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .media-rating { color: #f5c518; font-weight: 500; }
  .media-desc { font-size: 0.87rem; color: #aaa; line-height: 1.65; max-width: 640px; }

  .source-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .source-label { font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .source-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; padding: 6px 14px; cursor: pointer; transition: all 0.2s;
  }
  .source-btn.active, .source-btn:hover { background: var(--red); border-color: var(--red); color: #fff; }

  .episodes-section { display: none; }
  .next-ep-btn {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 12px 22px;
    cursor: pointer;
    margin-bottom: 28px;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .next-ep-btn:hover { background: var(--red-dark, #b20710); box-shadow: 0 4px 18px rgba(229,9,20,0.4); }
  .ep-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .ep-header-title { font-weight: 500; font-size: 1rem; }
  .season-select {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: #ffffff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 8px 12px;
    outline: none;
    cursor: pointer;
  }
  .season-select option {
    background: #1a1a1a;
    color: #ffffff;
  }
  .season-select:focus { border-color: var(--red); }
  .episodes-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 8px; max-height: 420px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: #333 transparent; padding-right: 4px;
  }
  .ep-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px; cursor: pointer; transition: background 0.15s, border-color 0.15s;
    text-decoration: none; color: var(--text);
  }
  .ep-item:hover { background: rgba(229,9,20,0.1); border-color: rgba(229,9,20,0.25); }
  .ep-item.current { background: rgba(229,9,20,0.18); border-color: var(--red); }
  .ep-item.watched { opacity: 0.5; }
  .ep-num { min-width: 26px; font-size: 0.75rem; color: var(--muted); font-weight: 500; }
  .ep-name { font-size: 0.85rem; flex: 1; }
  .ep-icon { font-size: 0.8rem; }

  @media (max-width: 640px) {
    .content-section { padding: 18px 14px 50px; }
    .media-poster { width: 70px; }
    .media-title { font-size: 1.5rem; }
    .episodes-list { grid-template-columns: 1fr; }
  }
   .player-inner:hover #next-ep-overlay[data-show] {
    display: flex !important;
  }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="home.html">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    Torna indietro
  </a>
  <a class="logo" href="home.html">MYSTREAM</a>
  <div class="now-playing">
    <div class="now-playing-title" id="np-title">Caricamento...</div>
    <div class="now-playing-sub" id="np-sub"></div>
  </div>
</header>

<div class="wrap">
  <div class="player-section">
    <div class="player-inner">
      <div class="player-loading" id="player-loading">
        <div class="spinner"></div>
        <p>Caricamento player...</p>
      </div>
      <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
      <button id="next-ep-overlay" onclick="goNextEpisode()" style="
        display:none;
        position:absolute;
        bottom:70px;
        right:20px;
        z-index:10;
        background:rgba(0,0,0,0.85);
        border:1px solid rgba(229,9,20,0.5);
        border-radius:8px;
        color:#fff;
        font-family:'DM Sans',sans-serif;
        font-size:0.85rem;
        font-weight:500;
        padding:10px 18px;
        cursor:pointer;
        display:none;
        align-items:center;
        gap:8px;
        transition:background 0.2s, border-color 0.2s;
        backdrop-filter:blur(4px);
      ">
        <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/><rect x="17" y="5" width="2" height="14" rx="1"/></svg>
        Prossimo episodio
      </button>
    </div>
  </div>

  <div class="content-section">
    <div class="media-info">
      <div class="media-poster" id="media-poster" style="display:none">
        <img id="media-poster-img" src="" alt="">
      </div>
      <div class="media-details">
        <div class="media-title" id="media-title">-</div>
        <div class="media-meta" id="media-meta"></div>
        <div class="media-desc" id="media-desc"></div>
      </div>
    </div>
    <!-- Prossimo episodio -->
    <button class="next-ep-btn" id="next-ep-btn" onclick="goNextEpisode()">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/><rect x="17" y="5" width="2" height="14" rx="1"/></svg>
      Prossimo episodio
    </button>
    <div class="source-row">
      <span class="source-label">Fonte video:</span>
      <button class="source-btn active" onclick="switchSource(0, this)">VixSrc</button>
      <button class="source-btn" onclick="switchSource(1, this)">Fonte 2</button>
      <button class="source-btn" onclick="switchSource(2, this)">Fonte 3</button>
    </div>

    <div class="episodes-section" id="episodes-section">
      <div class="ep-header">
        <span class="ep-header-title">Episodi</span>
        <select class="season-select" id="season-sel" onchange="changeSeason(this.value)"></select>
      </div>
      <div class="episodes-list" id="episodes-list"></div>
    </div>
  </div>
</div>

<script>
if (sessionStorage.getItem('ms_auth') !== '1') location.href = 'index.html';
const currentUser = sessionStorage.getItem('ms_user') || 'utente';

function sk(k) { return `ms_${currentUser}_${k}`; }
function getWatched() { return JSON.parse(localStorage.getItem(sk('watched')) || '{}'); }
function saveWatched(w) { localStorage.setItem(sk('watched'), JSON.stringify(w)); }
function getHistory() { return JSON.parse(localStorage.getItem(sk('history')) || '[]'); }
function saveHistory(h) { localStorage.setItem(sk('history'), JSON.stringify(h)); }

function addToHistory(item) {
  let h = getHistory();
  h = h.filter(x => !(x.id === item.id && x.type === item.type));
  h.unshift({ ...item, ts: Date.now() });
  if (h.length > 30) h = h.slice(0, 30);
  saveHistory(h);
}

function markWatched(key) {
  const w = getWatched();
  w[key] = true;
  saveWatched(w);
}

const params = new URLSearchParams(location.search);
const mediaType = params.get('type') || 'movie';
const tmdbId    = params.get('id') || '';
if (!tmdbId) { location.href = 'home.html'; }
const season    = parseInt(params.get('s') || '1');
const episode   = parseInt(params.get('e') || '1');
const titleP    = params.get('title') || '';
const epnameP   = params.get('epname') || '';
const TMDB_KEY  = '68206e948d6ca8853d8565cbfec26075';
const TMDB      = 'https://api.themoviedb.org/3';
const IMG       = 'https://image.tmdb.org/t/p';

let currentSeason    = season;
let currentEpisode   = episode;
let currentSource    = 0;
let episodesBySeason = {};
let mediaData        = null;
let historySaved     = false;

function getEmbedUrl(src, type, id, s, e) {
  if (src === 0) return type === 'movie' ? `https://vixsrc.to/movie/${id}?lang=it` : `https://vixsrc.to/tv/${id}/${s}/${e}?lang=it`;
  if (src === 1) return type === 'movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${s}/${e}`;
  if (src === 2) return type === 'movie' ? `https://embed.smashystream.com/playere.php?tmdb=${id}` : `https://embed.smashystream.com/playere.php?tmdb=${id}&season=${s}&episode=${e}`;
  return '';
}

function loadPlayer() {
  const url = getEmbedUrl(currentSource, mediaType, tmdbId, currentSeason, currentEpisode);
  const frame = document.getElementById('player-frame');
  const loading = document.getElementById('player-loading');
  loading.style.display = 'flex';
  frame.src = '';
  setTimeout(() => {
    frame.src = url;
    frame.onload = () => { loading.style.display = 'none'; };
    setTimeout(() => { loading.style.display = 'none'; }, 5000);
  }, 300);
}

function switchSource(idx, btn) {
  currentSource = idx;
  document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadPlayer();
}

function updateHeader() {
  document.getElementById('np-title').textContent = titleP || '—';
  if (mediaType === 'tv') {
    document.getElementById('np-sub').textContent = `S${currentSeason} · E${currentEpisode}${epnameP ? ' — ' + epnameP : ''}`;
  } else {
    document.getElementById('np-sub').textContent = 'Film';
  }
  document.title = `${titleP || 'MyStream'} — MyStream`;
}

async function loadInfo() {
  try {
    const url = new URL(`${TMDB}/${mediaType}/${tmdbId}`);
    url.searchParams.set('api_key', TMDB_KEY);
    url.searchParams.set('language', localStorage.getItem(`ms_${currentUser}_lang`) || 'it-IT');
    const r = await fetch(url.toString());
    if (!r.ok) return;
    mediaData = await r.json();

    const title  = mediaData.title || mediaData.name || titleP;
    const year   = (mediaData.release_date || mediaData.first_air_date || '').slice(0, 4);
    const rating = mediaData.vote_average ? mediaData.vote_average.toFixed(1) : '—';
    const poster = mediaData.poster_path ? `${IMG}/w342${mediaData.poster_path}` : '';
    const desc   = mediaData.overview || '';
    const genres = (mediaData.genres || []).slice(0, 3).map(g => g.name).join(' · ');

    document.getElementById('media-title').textContent = title;
    document.getElementById('media-meta').innerHTML = `
      <span class="media-rating">★ ${rating}</span>
      <span>${year}</span>
      ${mediaData.runtime ? `<span>${mediaData.runtime} min</span>` : ''}
      ${mediaData.number_of_seasons ? `<span>${mediaData.number_of_seasons} stagioni</span>` : ''}
      ${genres ? `<span>${genres}</span>` : ''}
    `;
    document.getElementById('media-desc').textContent = desc;

    if (poster) {
      document.getElementById('media-poster').style.display = 'block';
      document.getElementById('media-poster-img').src = poster;
    }

    const histBackdrop = mediaData.backdrop_path ? `${IMG}/w780${mediaData.backdrop_path}` : '';
    if (!historySaved) {
      historySaved = true;
      addToHistory({
        id: tmdbId, type: mediaType, title,
        backdrop: histBackdrop,
        season:  mediaType === 'tv' ? currentSeason  : undefined,
        episode: mediaType === 'tv' ? currentEpisode : undefined,
        epname:  mediaType === 'tv' ? (epnameP || '') : undefined
      });
    }

    if (mediaType === 'tv') {
      markWatched(`tv_${tmdbId}_s${currentSeason}_e${currentEpisode}`);
      await loadTVSeasons(mediaData);
    } else {
      markWatched(`movie_${tmdbId}`);
    }

  } catch(e) {
    console.error('Info error:', e);
  }
}

async function loadTVSeasons(data) {
  const seasons = (data.seasons || []).filter(s => s.season_number > 0);
  if (!seasons.length) return;
  const sel = document.getElementById('season-sel');
  sel.innerHTML = seasons.map(s =>
    `<option value="${s.season_number}" ${s.season_number === currentSeason ? 'selected' : ''}>Stagione ${s.season_number}</option>`
  ).join('');
  document.getElementById('episodes-section').style.display = 'block';
  await loadEpisodes(currentSeason);

  const currentSeasonData = episodesBySeason[currentSeason] || [];
  const hasNext = currentEpisode < currentSeasonData.length || seasons.some(s => s.season_number > currentSeason);
  if (hasNext) {
    document.getElementById('next-ep-overlay').setAttribute('data-show', '1');
    const btn = document.getElementById('next-ep-overlay');
    btn.onmouseover = () => { btn.style.background = 'rgba(229,9,20,0.9)'; btn.style.borderColor = '#e50914'; };
    btn.onmouseout  = () => { btn.style.background = 'rgba(0,0,0,0.85)';   btn.style.borderColor = 'rgba(229,9,20,0.5)'; };
    }

  // Mostra tasto prossimo episodio se non è l'ultimo
//   const currentSeasonData = episodesBySeason[currentSeason] || [];
//   const hasNext = currentEpisode < currentSeasonData.length || seasons.some(s => s.season_number > currentSeason);
//   if (mediaType === 'tv' && hasNext) {
//     document.getElementById('next-ep-btn').style.display = 'flex';
//   }
}

async function loadEpisodes(seasonNum) {
  const list = document.getElementById('episodes-list');
  list.innerHTML = '<div style="padding:12px;color:#555;font-size:0.82rem">Caricamento...</div>';
  seasonNum = parseInt(seasonNum);
  try {
    if (!episodesBySeason[seasonNum]) {
      const url = new URL(`${TMDB}/tv/${tmdbId}/season/${seasonNum}`);
      url.searchParams.set('api_key', TMDB_KEY);
      url.searchParams.set('language', localStorage.getItem(`ms_${currentUser}_lang`) || 'it-IT');
      const r = await fetch(url.toString());
      episodesBySeason[seasonNum] = (await r.json()).episodes || [];
    }
    renderEpisodes(seasonNum);
  } catch(e) {
    list.innerHTML = '<div style="padding:12px;color:#555;font-size:0.82rem">Errore nel caricamento.</div>';
  }
}

function renderEpisodes(seasonNum) {
  const eps     = episodesBySeason[seasonNum] || [];
  const list    = document.getElementById('episodes-list');
  const watched = getWatched();
  list.innerHTML = '';

  eps.forEach(ep => {
    const wKey      = `tv_${tmdbId}_s${seasonNum}_e${ep.episode_number}`;
    const isCurrent = seasonNum === currentSeason && ep.episode_number === currentEpisode;
    const isWatched = watched[wKey];
    const title     = mediaData ? (mediaData.name || titleP) : titleP;

    const a = document.createElement('a');
    a.className = `ep-item${isCurrent ? ' current' : ''}${isWatched && !isCurrent ? ' watched' : ''}`;
    a.href = `watch.html?type=tv&id=${tmdbId}&s=${seasonNum}&e=${ep.episode_number}&title=${encodeURIComponent(title)}&epname=${encodeURIComponent(ep.name)}`;
    a.innerHTML = `
      <span class="ep-num">${ep.episode_number}</span>
      <span class="ep-name">${ep.name}</span>
      <span class="ep-icon">${isCurrent ? '▶' : isWatched ? '✓' : ''}</span>`;
    list.appendChild(a);
  });

  setTimeout(() => {
    const cur = list.querySelector('.current');
    if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 100);
}

async function changeSeason(val) {
  await loadEpisodes(parseInt(val));
}

function goNextEpisode() {
  if (!mediaData) return;
  const seasons = (mediaData.seasons || []).filter(s => s.season_number > 0);
  const currentSeasonData = episodesBySeason[currentSeason] || [];
  const nextEpNum = currentEpisode + 1;

  if (nextEpNum <= currentSeasonData.length) {
    // Episodio successivo nella stessa stagione
    const nextEp = currentSeasonData.find(e => e.episode_number === nextEpNum);
    const title = mediaData.name || titleP;
    location.href = `watch.html?type=tv&id=${tmdbId}&s=${currentSeason}&e=${nextEpNum}&title=${encodeURIComponent(title)}&epname=${encodeURIComponent(nextEp?.name || '')}`;
  } else {
    // Prima stagione successiva disponibile
    const nextSeason = seasons.find(s => s.season_number > currentSeason);
    if (nextSeason) {
      const title = mediaData.name || titleP;
      location.href = `watch.html?type=tv&id=${tmdbId}&s=${nextSeason.season_number}&e=1&title=${encodeURIComponent(title)}&epname=`;
    }
  }
}
function goNextEpisode() {
  if (!mediaData) return;
  const seasons = (mediaData.seasons || []).filter(s => s.season_number > 0);
  const currentSeasonData = episodesBySeason[currentSeason] || [];
  const nextEpNum = currentEpisode + 1;
  const title = mediaData.name || titleP;

  if (nextEpNum <= currentSeasonData.length) {
    const nextEp = currentSeasonData.find(e => e.episode_number === nextEpNum);
    location.href = `watch.html?type=tv&id=${tmdbId}&s=${currentSeason}&e=${nextEpNum}&title=${encodeURIComponent(title)}&epname=${encodeURIComponent(nextEp?.name || '')}`;
  } else {
    const nextSeason = seasons.find(s => s.season_number > currentSeason);
    if (nextSeason) {
      location.href = `watch.html?type=tv&id=${tmdbId}&s=${nextSeason.season_number}&e=1&title=${encodeURIComponent(title)}&epname=`;
    }
  }
}
updateHeader();
loadPlayer();
loadInfo();
</script>
</body>
</html>
