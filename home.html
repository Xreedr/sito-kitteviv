<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e50914; --red-dark: #b20710; --bg: #0a0a0a; --surface: #141414;
    --card-bg: #1a1a1a; --border: #222; --text: #e5e5e5; --muted: #757575; --header-h: 64px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0.6));
    backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; z-index: 100; gap: 16px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: var(--red); letter-spacing: 3px; text-decoration: none; white-space: nowrap; text-shadow: 0 0 20px rgba(229,9,20,0.4); flex-shrink: 0; }
  .search-wrap { display: flex; align-items: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0 14px; gap: 8px; flex: 1; max-width: 420px; transition: border-color 0.2s; }
  .search-wrap:focus-within { border-color: var(--red); }
  .search-wrap svg { color: var(--muted); flex-shrink: 0; }
  .search-wrap input { background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; width: 100%; padding: 10px 0; }
  .search-wrap input::placeholder { color: var(--muted); }
  .user-area { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .username-badge { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .logout-btn { background: rgba(229,9,20,0.15); border: 1px solid rgba(229,9,20,0.3); border-radius: 6px; color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 6px 12px; cursor: pointer; transition: background 0.2s; letter-spacing: 0.5px; }
  .logout-btn:hover { background: rgba(229,9,20,0.28); }

  main { padding-top: calc(var(--header-h) + 24px); padding-bottom: 60px; }

  .hero { position: relative; width: 100%; height: 480px; overflow: hidden; margin-bottom: 10px; }
  .hero-img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.35); }
  .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to right, rgba(10,10,10,0.95) 30%, transparent 70%), linear-gradient(to top, rgba(10,10,10,1) 0%, transparent 40%); }
  .hero-content { position: absolute; bottom: 60px; left: 48px; max-width: 460px; }
  .hero-badge { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 10px; font-weight: 500; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; line-height: 1; letter-spacing: 2px; margin-bottom: 12px; }
  .hero-desc { font-size: 0.88rem; color: #aaa; line-height: 1.6; margin-bottom: 22px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-play { background: var(--red); border: none; border-radius: 8px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; transition: background 0.2s, box-shadow 0.2s; }
  .btn-play:hover { background: var(--red-dark); box-shadow: 0 4px 18px rgba(229,9,20,0.4); }
  .btn-info { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 12px 20px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
  .btn-info:hover { background: rgba(255,255,255,0.2); }

  .section { padding: 0 24px; margin-bottom: 36px; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .section-title { font-weight: 500; font-size: 1.05rem; color: var(--text); letter-spacing: 0.3px; }
  .section-count { font-size: 0.75rem; color: var(--muted); background: var(--surface); border-radius: 4px; padding: 2px 8px; }

  .slider-wrap { position: relative; }
  .slider { display: flex; gap: 8px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding: 8px 2px 20px; }
  .slider::-webkit-scrollbar { display: none; }
  .arrow { position: absolute; top: 0; bottom: 0; width: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 650; opacity: 0; transition: opacity 0.2s; border: none; }
  .slider-wrap:hover .arrow { opacity: 1; }
  .slider-wrap:has(.card:hover) .arrow { opacity: 1; }
  .arrow-left { left: 0; background: linear-gradient(to right, rgba(10,10,10,0.95), transparent); }
  .arrow-right { right: 0; background: linear-gradient(to left, rgba(10,10,10,0.95), transparent); }
  .arrow svg { color: #fff; }

  /* ── CARD 16:9 ── */
  .card { flex: 0 0 280px; height: 160px; border-radius: 6px; overflow: visible; cursor: pointer; position: relative; background: var(--card-bg); transition: transform 0.18s ease; text-decoration: none; flex-shrink: 0; }
  .card-inner { width: 100%; height: 100%; border-radius: 6px; overflow: hidden; position: relative; }
  .card:hover { transform: scale(1.04); z-index: 2; }
  .card-inner img.card-backdrop { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* gradient sempre presente */
  .card-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, transparent 100%); pointer-events: none; }
  /* logo TMDB sovrapposto centrato in basso */
  .card-logo-wrap { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; align-items: flex-end; justify-content: center; padding: 0 12px; min-height: 44px; }
  .card-logo-wrap img { max-width: 75%; max-height: 44px; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.9)); transition: opacity 0.3s; }
  /* fallback testo se logo non esiste */
  .card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 10px 9px; text-align: center; }
  .card-label-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 2px 8px rgba(0,0,0,0.9); line-height: 1.2; }
  .card-label-sub { font-size: 0.58rem; color: #aaa; margin-top: 1px; white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
  .card-skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }

  /* ── POPUP in-place (Netflix style) ── */
  .card-popup {
    position: fixed; z-index: 600; pointer-events: none;
    opacity: 0; transform: scale(0.88) translateY(4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.97), 0 0 0 1px rgba(255,255,255,0.07);
    background: #141414; width: 280px;
  }
  .card-popup.visible { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

  .popup-media { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
  .popup-media iframe { position: absolute; inset: 0; width: 180%; height: 180%; top: -40%; left: -40%; border: none; pointer-events: none; }
  .popup-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .popup-media-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, #141414, transparent); pointer-events: none; }
  .popup-sound { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(20,20,20,0.75); border: 1.5px solid rgba(255,255,255,0.35); color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; pointer-events: auto; transition: border-color 0.15s; }
  .popup-sound:hover { border-color: #fff; }

  .popup-body { padding: 10px 12px 13px; }
  .popup-actions { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
  .pb { width: 30px; height: 30px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; text-decoration: none; font-size: 13px; }
  .pb-play { background: #fff; color: #000; }
  .pb-play:hover { background: #e0e0e0; }
  .pb-circle { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
  .pb-circle:hover { border-color: #fff; background: rgba(255,255,255,0.08); }
  .pb-info { margin-left: auto; background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); font-size: 15px; }
  .pb-info:hover { border-color: #fff; background: rgba(255,255,255,0.08); }

  .popup-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 0.68rem; margin-bottom: 6px; }
  .pm-rating { color: #46d369; font-weight: 700; }
  .pm-year, .pm-seasons { color: #bbb; }
  .pm-age { border: 1px solid #888; color: #bbb; font-size: 0.57rem; padding: 1px 4px; border-radius: 2px; }

  .popup-genres { font-size: 0.65rem; color: #888; }
  .popup-genres .pdot { margin: 0 5px; color: #444; }

  /* ── CW CARD ── */
  .cw-card { flex: 0 0 300px; height: 180px; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; background: var(--card-bg); transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; border: 1px solid rgba(229,9,20,0.2); }
  .cw-card:hover { transform: scale(1.04) translateY(-2px); box-shadow: 0 10px 30px rgba(229,9,20,0.2); z-index: 2; }
  .cw-card img { width:100%; height:100%; object-fit:cover; display:block; filter:brightness(0.6); }
  .cw-info { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:flex-end; padding:12px; background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,transparent 60%); }
  .cw-title { font-size:0.82rem; font-weight:500; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cw-sub { font-size:0.68rem; color:#aaa; margin-top:2px; }
  .cw-bar-wrap { height:3px; background:rgba(255,255,255,0.2); border-radius:2px; margin-top:8px; overflow:hidden; }
  .cw-bar { height:100%; background:var(--red); border-radius:2px; }
  .cw-play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; background:rgba(0,0,0,0.7); border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; }
  .cw-card:hover .cw-play { opacity:1; }
  .cw-menu { position:absolute; top:8px; right:8px; z-index:10; }
  .cw-menu-btn { width:28px; height:28px; border:none; border-radius:50%; background:rgba(0,0,0,0.7); color:white; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
  .cw-dropdown { position:absolute; top:34px; right:0; background:#1f1f1f; border:1px solid #333; border-radius:6px; padding:6px 0; display:none; min-width:170px; }
  .cw-dropdown button { width:100%; background:none; border:none; color:#eee; padding:8px 12px; text-align:left; cursor:pointer; font-size:0.8rem; }
  .cw-dropdown button:hover { background:rgba(229,9,20,0.2); }

  /* ── MODAL ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:700; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:#181818; border-radius:14px; width:100%; max-width:720px; max-height:90vh; overflow-y:auto; position:relative; animation:modalIn 0.3s ease both; scrollbar-width:thin; scrollbar-color:#333 transparent; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.93) translateY(20px);}to{opacity:1;transform:none;} }
  .modal-close { position:sticky; top:0; float:right; margin:12px 12px -40px 0; width:34px; height:34px; background:rgba(0,0,0,0.7); border:none; border-radius:50%; color:#fff; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; transition:background 0.2s; }
  .modal-close:hover { background:var(--red); }
  .modal-backdrop { width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:14px 14px 0 0; display:block; filter:brightness(0.5); }
  .modal-gradient { position:absolute; left:0; right:0; height:200px; background:linear-gradient(to bottom,transparent,#181818); pointer-events:none; }
  .modal-body { padding:0 28px 28px; }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:2px; margin-bottom:4px; }
  .modal-tagline { font-size:0.82rem; color:var(--muted); font-style:italic; margin-bottom:14px; }
  .modal-meta { display:flex; gap:16px; margin-bottom:14px; font-size:0.8rem; color:var(--muted); align-items:center; flex-wrap:wrap; }
  .modal-rating { color:#f5c518; font-weight:500; }
  .modal-desc { font-size:0.88rem; color:#bbb; line-height:1.7; margin-bottom:22px; }
  .modal-actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
  .season-label { font-size:0.72rem; letter-spacing:1px; text-transform:uppercase; color:var(--red); margin-bottom:8px; }
  .season-select { background:#1a1a1a; border:1px solid #444; border-radius:7px; color:#fff; font-family:'DM Sans',sans-serif; font-size:0.87rem; padding:9px 12px; outline:none; cursor:pointer; margin-bottom:16px; }
  .season-select option { background:#1a1a1a; color:#fff; }
  .season-select:focus { border-color:var(--red); }
  .episodes-grid { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:#333 transparent; }
  .ep-btn { display:flex; align-items:center; gap:14px; padding:11px 14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:8px; cursor:pointer; text-decoration:none; color:var(--text); transition:background 0.15s,border-color 0.15s; }
  .ep-btn:hover { background:rgba(229,9,20,0.12); border-color:rgba(229,9,20,0.3); }
  .ep-btn.watched { opacity:0.5; }
  .ep-num { min-width:28px; font-size:0.78rem; color:var(--muted); font-weight:500; }
  .ep-name { font-size:0.87rem; flex:1; }
  .ep-check { color:#4caf50; font-size:0.85rem; }

  #search-section { display:none; }
  .search-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; margin-top:16px; }
  .search-card { border-radius:8px; overflow:hidden; cursor:pointer; background:var(--card-bg); transition:transform 0.2s,box-shadow 0.2s; position:relative; aspect-ratio:2/3; }
  .search-card:hover { transform:scale(1.04) translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,0.6); }
  .search-card img { width:100%; height:100%; object-fit:cover; display:block; }
  .search-card-info { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,0.95),transparent); padding:10px 8px 8px; opacity:0; transition:opacity 0.2s; }
  .search-card:hover .search-card-info { opacity:1; }
  .search-card-title { font-size:0.75rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .search-card-type { font-size:0.65rem; color:var(--red); }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(100px); background:#222; border:1px solid var(--border); border-radius:10px; padding:12px 22px; font-size:0.85rem; color:var(--text); z-index:800; transition:transform 0.3s ease; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .empty { padding:28px; text-align:center; color:var(--muted); font-size:0.88rem; font-style:italic; }

  @keyframes shimmer { 0%{background-position:200% 0;}100%{background-position:-200% 0;} }

  @media (max-width:640px) {
    header { padding:0 14px; gap:10px; } .logo { font-size:1.5rem; } .username-badge { display:none; }
    .hero { height:300px; } .hero-content { left:16px; bottom:30px; max-width:90%; } .hero-title { font-size:2.2rem; }
    .section { padding:0 12px; } .card { flex:0 0 180px; height:102px; } .cw-card { flex:0 0 180px; height:106px; }
    .card-popup { width:240px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="home.html">MYSTREAM</a>
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Cerca film e serie..." autocomplete="off">
  </div>
  <div class="user-area">
    <span class="username-badge" id="usernameDisplay"></span>
    <button class="logout-btn" onclick="logout()">Esci</button>
  </div>
</header>

<main>
  <div class="hero" id="hero">
    <img class="hero-img" id="hero-img" src="" alt="">
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="hero-badge" id="hero-badge">IN EVIDENZA</div>
      <div class="hero-title" id="hero-title">Caricamento...</div>
      <div class="hero-desc" id="hero-desc"></div>
      <div class="hero-actions">
        <a class="btn-play" id="hero-play" href="#"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Guarda ora</a>
        <button class="btn-info" id="hero-info">Più info</button>
      </div>
    </div>
  </div>

  <div class="section" id="cw-section" style="display:none">
    <div class="section-header"><span class="section-title">▶ Continua a guardare</span></div>
    <div class="slider-wrap">
      <button class="arrow arrow-left" onclick="scrollSlider(this,-1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="slider" id="cw-slider"></div>
      <button class="arrow arrow-right" onclick="scrollSlider(this,1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>

  <div class="section" id="search-section">
    <div class="section-header">
      <span class="section-title">🔍 Risultati ricerca</span>
      <button onclick="clearSearch()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;text-decoration:underline;">✕ Chiudi</button>
    </div>
    <div class="search-grid" id="search-grid"></div>
  </div>

  <div id="sliders-container"></div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div style="position:relative">
      <img class="modal-backdrop" id="modal-backdrop" src="" alt="">
      <div class="modal-gradient" style="top:calc(100% - 200px)"></div>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-tagline" id="modal-tagline"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-actions" id="modal-actions"></div>
      <div id="modal-seasons-wrap"></div>
    </div>
  </div>
</div>

<div class="card-popup" id="card-popup"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  messagingSenderId:"1088703261672",appId:"1:1088703261672:web:cb2b0ddbda6eb235ba125d"

  28:'Azione',12:'Avventura',16:'Animazione',35:'Commedia',80:'Crime',99:'Documentario',
  18:'Dramma',10751:'Famiglia',14:'Fantasy',36:'Storia',27:'Horror',10402:'Musica',
  9648:'Mistero',10749:'Romance',878:'Fantascienza',10770:'TV Movie',53:'Thriller',
  10752:'Guerra',37:'Western',10759:'Action & Adventure',10762:'Kids',10763:'News',
  10764:'Reality',10765:'Sci-Fi & Fantasy',10766:'Soap',10767:'Talk',10768:'War & Politics'
};

// ── Auth ──
if (sessionStorage.getItem('ms_auth') !== '1') location.href = 'index.html';
const currentUser = sessionStorage.getItem('ms_user') || 'utente';

// ── Storage ──
function storageKey(k) { return `ms_${currentUser}_${k}`; }
function getHistory() { return JSON.parse(localStorage.getItem(storageKey('history'))||'[]'); }
function saveHistory(h) { localStorage.setItem(storageKey('history'),JSON.stringify(h)); fbSaveHistory(h); }
function getWatched() { return JSON.parse(localStorage.getItem(storageKey('watched'))||'{}'); }
function saveWatched(w) { localStorage.setItem(storageKey('watched'),JSON.stringify(w)); }

async function fbSaveHistory(h) {
  try { await setDoc(doc(db,'history',currentUser),{items:JSON.stringify(h)}); } catch(e){}
}
async function fbLoadHistory() {
  try {
    const snap = await getDoc(doc(db,'history',currentUser));
    if (snap.exists()) {
      const remote = JSON.parse(snap.data().items||'[]');
      const local = getHistory();
      const merged = [...remote,...local]
        .filter((x,i,arr)=>arr.findIndex(y=>y.id===x.id&&y.type===x.type)===i)
        .sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,30);
      localStorage.setItem(storageKey('history'),JSON.stringify(merged));
      renderContinueWatching();
    }
  } catch(e){}
}

let currentLang = localStorage.getItem(storageKey('lang')) || 'it-IT';
async function tmdb(path, params={}) {
  const url = new URL(`${TMDB}${path}`);
  url.searchParams.set('api_key',TMDB_KEY); url.searchParams.set('language',currentLang);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const r = await fetch(url.toString());
  if (!r.ok) throw new Error(`TMDB ${r.status}`);
  return r.json();
}

const popup = document.getElementById('card-popup');
let popupTimer, activePopupKey = null;
const omdbCache = {}, trailerCache = {};
let isMuted = true;

function positionPopup(rect) {
  const pw = 280, ph = 330;
  let left = rect.left + rect.width/2 - pw/2;
  left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
  let top = rect.top + rect.height/2 - ph/2;
  top = Math.max(74, Math.min(top, window.innerHeight - ph - 8));
  popup.style.left = left+'px';
  popup.style.top  = top+'px';
}

function buildPopupHTML(d, trailerKey, omdb) {
  const watchUrl = d.type==='movie'
    ? `watch.html?type=movie&id=${d.id}&title=${encodeURIComponent(d.name)}`
    : `watch.html?type=tv&id=${d.id}&s=1&e=1&title=${encodeURIComponent(d.name)}`;

  const imdbRating = omdb?.imdbRating && omdb.imdbRating!=='N/A' ? omdb.imdbRating : d.rating||'';
  const rated      = omdb?.Rated      && omdb.Rated!=='N/A'      ? omdb.Rated      : '';
  const seasonsNum = omdb?.totalSeasons && omdb.totalSeasons!=='N/A' ? omdb.totalSeasons : (d.seasons||'');
  const seasonsStr = seasonsNum ? `${seasonsNum} stagion${seasonsNum==1?'e':'i'}` : '';

  let mediaHTML;
  if (trailerKey) {
    const mp = isMuted?1:0;
    mediaHTML = `<iframe src="https://www.youtube.com/embed/${trailerKey}?autoplay=1&mute=${mp}&controls=0&loop=1&playlist=${trailerKey}&modestbranding=1&rel=0&playsinline=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  } else if (d.backdrop) {
    mediaHTML = `<img src="${d.backdrop}" alt="${d.name}">`;
  } else {
    mediaHTML = `<div style="width:100%;height:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;color:#333;font-size:1.8rem">🎬</div>`;
  }

  const genreParts = (d.genres||'').split(' · ').filter(Boolean);
  const genreHTML = genreParts.map((g,i)=>`<span>${g}</span>${i<genreParts.length-1?'<span class="pdot">•</span>':''}`).join('');

  return `
    <div class="popup-media">
      ${mediaHTML}
      <div class="popup-media-fade"></div>
      ${trailerKey?`<button class="popup-sound" id="popup-sound-btn" onclick="togglePopupSound()">${isMuted?'🔇':'🔊'}</button>`:''}
    </div>
    <div class="popup-body">
      <div class="popup-actions">
        <a class="pb pb-play" href="${watchUrl}">
          <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </a>
        <button class="pb pb-circle" title="Aggiungi alla lista">＋</button>
        <button class="pb pb-info" title="Più info" onclick="openModal(${d.id},'${d.type}')">⌄</button>
      </div>
      <div class="popup-meta">
        ${imdbRating?`<span class="pm-rating">★ ${imdbRating}</span>`:''}
        ${d.year?`<span class="pm-year">${d.year}</span>`:''}
        ${seasonsStr?`<span class="pm-seasons">${seasonsStr}</span>`:''}
        ${rated?`<span class="pm-age">${rated}</span>`:''}
      </div>
      ${genreHTML?`<div class="popup-genres">${genreHTML}</div>`:''}
    </div>`;
}

window.togglePopupSound = function() {
  isMuted = !isMuted;
  const card = document.querySelector('.card[data-active="1"]');
  if (!card) return;
  const d = JSON.parse(card.dataset.popup||'{}');
  const key = trailerCache[d.id+'_'+d.type];
  const omdb = omdbCache[d.name+'_'+d.year]||{};
  popup.innerHTML = buildPopupHTML(d, key, omdb);
};

async function showCardPopup(e) {
  const card = e.currentTarget;
  const d = JSON.parse(card.dataset.popup||'{}');
  if (!d.id) return;
  clearTimeout(popupTimer);
  document.querySelectorAll('.card[data-active]').forEach(c=>c.removeAttribute('data-active'));
  card.setAttribute('data-active','1');
  const cacheKey = d.id+'_'+d.type;
  const omdbKey  = d.name+'_'+d.year;
  activePopupKey = cacheKey;

  const rect = card.getBoundingClientRect();

  // Mostra subito con dati base
  popup.innerHTML = buildPopupHTML(d, trailerCache[cacheKey]||null, omdbCache[omdbKey]||{});
  positionPopup(rect);
  popupTimer = setTimeout(()=>popup.classList.add('visible'), 220);

  // Fetch trailer + OMDB in parallelo
  const [trailerKey, omdb] = await Promise.all([
    (async()=>{
      if (trailerCache[cacheKey] !== undefined) return trailerCache[cacheKey];
      try {
        const data = await tmdb(`/${d.type}/${d.id}/videos`,{language:'en-US'});
        const t = (data.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube')
               || (data.results||[]).find(v=>v.site==='YouTube');
        trailerCache[cacheKey] = t ? t.key : null;
      } catch { trailerCache[cacheKey]=null; }
      return trailerCache[cacheKey];
    })(),
    (async()=>{
      if (omdbCache[omdbKey]) return omdbCache[omdbKey];
      try {
        const type = d.type==='tv'?'series':'movie';
        const r = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(d.name)}&y=${d.year}&type=${type}&apikey=${OMDB_KEY}`);
        const j = await r.json();
        omdbCache[omdbKey] = j.Response==='True' ? j : {};
      } catch { omdbCache[omdbKey]={}; }
      return omdbCache[omdbKey];
    })()
  ]);

  if (activePopupKey===cacheKey && (popup.classList.contains('visible') || popupTimer)) {
    positionPopup(rect);
    popup.innerHTML = buildPopupHTML(d, trailerKey, omdb);
  }
}

function hideCardPopup() {
  clearTimeout(popupTimer);
  popupTimer = setTimeout(()=>{
    popup.classList.remove('visible');
    activePopupKey = null;
    document.querySelectorAll('.card[data-active]').forEach(c=>c.removeAttribute('data-active'));
  }, 350);
}

popup.addEventListener('mouseenter', ()=>clearTimeout(popupTimer));
popup.addEventListener('mouseleave', hideCardPopup);

//  LOGO LAZY LOADER (TMDB logo PNG)
// ══════════════════════════════════════
const logoCache = {}; // id_type → url | null

async function fetchLogo(id, type) {
  const key = `${id}_${type}`;
  if (logoCache[key] !== undefined) return logoCache[key];
  try {
    const data = await tmdb(`/${type}/${id}/images`, { include_image_language: 'en,it,null' });
    const logos = (data.logos || []).filter(l => l.file_path);
    // Preferisce logo con aspect ratio orizzontale e alta risoluzione
    logos.sort((a, b) => (b.width / b.height) - (a.width / a.height) || b.vote_count - a.vote_count);
    logoCache[key] = logos[0] ? `${IMG}/w300${logos[0].file_path}` : null;
  } catch { logoCache[key] = null; }
  return logoCache[key];
}

const logoObserver = new IntersectionObserver(async (entries) => {
  for (const entry of entries) {
    if (!entry.isIntersecting) continue;
    const card = entry.target;
    logoObserver.unobserve(card);
    const id   = card.dataset.logoId;
    const type = card.dataset.logoType;
    if (!id) continue;
    const url = await fetchLogo(id, type);
    const logoWrap  = card.querySelector(`#logo-${id}-${type}`);
    const labelEl   = card.querySelector(`#label-${id}-${type}`);
    if (url && logoWrap) {
      const img = document.createElement('img');
      img.src = url;
      img.alt = '';
      img.style.opacity = '0';
      img.onload = () => {
        img.style.opacity = '1';
        if (labelEl) labelEl.style.display = 'none'; // nascondi testo fallback
      };
      img.onerror = () => img.remove(); // fallback testo rimane
      logoWrap.appendChild(img);
    }
  }
}, { rootMargin: '200px' }); // precarica 200px prima che sia visibile

function buildSection(title, items, type, containerId) {
  const container = document.getElementById(containerId||'sliders-container');
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-header">
      <span class="section-title">${title}</span>
      <span class="section-count">${items.length}</span>
    </div>
    <div class="slider-wrap">
      <button class="arrow arrow-left" onclick="scrollSlider(this,-1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="slider" id="sl-${Math.random().toString(36).slice(2)}"></div>
      <button class="arrow arrow-right" onclick="scrollSlider(this,1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>`;
  container.appendChild(sec);
  const slider = sec.querySelector('.slider');

  items.forEach(item => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = '#';
    const itemType = type || item.media_type || 'movie';
    a.onclick = (ev) => { ev.preventDefault(); openModal(item.id,itemType); };

    const poster   = item.backdrop_path ? `${IMG}/w780${item.backdrop_path}` : (item.poster_path ? `${IMG}/w342${item.poster_path}` : '');
    const backdrop = item.backdrop_path ? `${IMG}/w780${item.backdrop_path}` : '';
    const name     = item.title || item.name || '';
    const year     = (item.release_date||item.first_air_date||'').slice(0,4);
    const rating   = item.vote_average ? item.vote_average.toFixed(1) : '';
    const genres   = (item.genre_ids||[]).slice(0,3).map(id=>GENRE_MAP[id]).filter(Boolean).join(' · ');
    const badge    = itemType==='tv' ? 'Serie' : 'Film';

    a.dataset.popup = JSON.stringify({id:item.id,type:itemType,name,year,rating,genres,backdrop,overview:item.overview||'',seasons:''});
    a.addEventListener('mouseenter', showCardPopup);
    a.addEventListener('mouseleave', hideCardPopup);

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    if (poster) {
      inner.innerHTML = `
        <div class="card-skeleton"></div>
        <img class="card-backdrop" src="${poster}" alt="${name}" loading="lazy"
             onload="this.previousElementSibling.style.display='none'">
        <div class="card-gradient"></div>
        <div class="card-logo-wrap" id="logo-${item.id}-${itemType}"></div>
        <div class="card-label" id="label-${item.id}-${itemType}">
          <div class="card-label-title">${name}</div>
          <div class="card-label-sub">${year}${year&&badge?' · ':''}${badge}</div>
        </div>`;
    } else {
      inner.innerHTML = `
        <div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:0.72rem;color:#444;padding:8px;text-align:center">${name}</div>
        <div class="card-gradient"></div>
        <div class="card-label">
          <div class="card-label-title">${name}</div>
          <div class="card-label-sub">${year}${year&&badge?' · ':''}${badge}</div>
        </div>`;
    }

    a.appendChild(inner);
    // Schedula lazy logo fetch
    logoObserver.observe(a);
    a.dataset.logoId   = item.id;
    a.dataset.logoType = itemType;
    slider.appendChild(a);
  });
}

function scrollSlider(btn,dir) {

}

// ── Modal ──
let currentModalId=null,currentModalType=null,episodesBySeason={};
async function openModal(id,type) {
  popup.classList.remove('visible');
  currentModalId=id; currentModalType=type;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('modal-title').textContent='Caricamento...';
  ['modal-tagline','modal-meta','modal-desc','modal-actions','modal-seasons-wrap'].forEach(x=>document.getElementById(x).innerHTML='');
  try {
    const d=await tmdb(`/${type}/${id}`,{append_to_response:'credits'});
    const bd=d.backdrop_path?`${IMG}/w1280${d.backdrop_path}`:(d.poster_path?`${IMG}/w780${d.poster_path}`:'');
    const title=d.title||d.name, year=(d.release_date||d.first_air_date||'').slice(0,4);
    const rating=d.vote_average?d.vote_average.toFixed(1):'—';
    document.getElementById('modal-backdrop').src=bd;
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-tagline').textContent=d.tagline||'';
    document.getElementById('modal-meta').innerHTML=`
      <span class="modal-rating">★ ${rating}</span><span>${year}</span>
      ${d.runtime?`<span>${d.runtime} min</span>`:''}
      ${d.number_of_seasons?`<span>${d.number_of_seasons} stagioni</span>`:''}
      ${(d.genres||[]).slice(0,3).map(g=>`<span>${g.name}</span>`).join('')}`;
    document.getElementById('modal-desc').textContent=d.overview||'Nessuna descrizione.';
    if (type==='movie') {
      document.getElementById('modal-actions').innerHTML=`<a class="btn-play" href="watch.html?type=movie&id=${id}&title=${encodeURIComponent(title)}"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Guarda il film</a>`;
    } else {
      const seasons=(d.seasons||[]).filter(s=>s.season_number>0);
      episodesBySeason={};
      if (seasons.length) {
        document.getElementById('modal-seasons-wrap').innerHTML=`
          <p class="season-label">Stagione</p>
          <select class="season-select" id="season-sel" onchange="loadEpisodes(this.value)">
            ${seasons.map(s=>`<option value="${s.season_number}">Stagione ${s.season_number}</option>`).join('')}
          </select>
          <div class="episodes-grid" id="ep-grid"><div class="empty">Caricamento episodi...</div></div>`;
        await loadEpisodes(1);
      }
    }
  } catch(e){document.getElementById('modal-title').textContent='Errore nel caricamento.';}
}
async function loadEpisodes(seasonNum) {
  const grid=document.getElementById('ep-grid'); if(!grid)return;
  grid.innerHTML='<div class="empty">Caricamento...</div>';
  const watched=getWatched(),key=`${currentModalType}_${currentModalId}`;
  try {
    if (!episodesBySeason[seasonNum]) { const data=await tmdb(`/tv/${currentModalId}/season/${seasonNum}`); episodesBySeason[seasonNum]=data.episodes||[]; }
    const eps=episodesBySeason[seasonNum]; grid.innerHTML='';
    if (!eps.length){grid.innerHTML='<div class="empty">Nessun episodio.</div>';return;}
    eps.forEach(ep=>{
      const epKey=`${key}_s${seasonNum}_e${ep.episode_number}`,isWatched=watched[epKey];
      const title=document.getElementById('modal-title').textContent;
      const a=document.createElement('a');
      a.className=`ep-btn${isWatched?' watched':''}`;
      a.href=`watch.html?type=tv&id=${currentModalId}&s=${seasonNum}&e=${ep.episode_number}&title=${encodeURIComponent(title)}&epname=${encodeURIComponent(ep.name)}`;
      a.innerHTML=`<span class="ep-num">${ep.episode_number}</span><span class="ep-name">${ep.name}</span>${isWatched?'<span class="ep-check">✓</span>':''}`;
      a.onclick=()=>{const w=getWatched();w[epKey]=true;saveWatched(w);};
      grid.appendChild(a);
    });
  } catch(e){grid.innerHTML='<div class="empty">Errore episodi.</div>';}
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';episodesBySeason={};}
function navigateWatch(id,type,season,episode,title,epname){let url=`watch.html?type=${type}&id=${id}&title=${encodeURIComponent(title||'')}`;if(type==='tv')url+=`&s=${season}&e=${episode}&epname=${encodeURIComponent(epname||'')}`;location.href=url;}

// ── Continue Watching ──
function renderContinueWatching() {
  const h=getHistory(),slider=document.getElementById('cw-slider');
  slider.innerHTML='';
  if(!h.length){document.getElementById('cw-section').style.display='none';return;}
  document.getElementById('cw-section').style.display='block';
  h.slice(0,15).forEach(item=>{
    const a=document.createElement('a');a.className='cw-card';
    const wu=item.type==='movie'?`watch.html?type=movie&id=${item.id}&title=${encodeURIComponent(item.title||'')}`:`watch.html?type=tv&id=${item.id}&s=${item.season}&e=${item.episode}&title=${encodeURIComponent(item.title||'')}&epname=${encodeURIComponent(item.epname||'')}`;
    a.href=wu;
    const sub=item.type==='movie'?'Film':`S${item.season} E${item.episode} · ${item.epname||''}`;
    a.innerHTML=`
      ${item.backdrop?`<img src="${item.backdrop}" alt="" loading="lazy">`:'<div style="width:100%;height:100%;background:#222"></div>'}
      <div class="cw-menu"><button class="cw-menu-btn" onclick="event.preventDefault();event.stopPropagation();toggleMenu(this)">⋮</button><div class="cw-dropdown"><button onclick="event.preventDefault();event.stopPropagation();removeContinue(${item.ts})">Rimuovi</button></div></div>
      <div class="cw-play"><svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="cw-info"><div class="cw-title">${item.title||''}</div><div class="cw-sub">${sub}</div><div class="cw-bar-wrap"><div class="cw-bar" style="width:${Math.floor(Math.random()*40+20)}%"></div></div></div>`;
    slider.appendChild(a);
  });
}
function toggleMenu(btn){const m=btn.nextElementSibling;document.querySelectorAll('.cw-dropdown').forEach(d=>{if(d!==m)d.style.display='none';});m.style.display=m.style.display==='block'?'none':'block';}
document.addEventListener('click',()=>document.querySelectorAll('.cw-dropdown').forEach(d=>d.style.display='none'));
function removeContinue(ts){let h=getHistory();h=h.filter(i=>i.ts!==ts);saveHistory(h);renderContinueWatching();}

let searchTimeout;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(searchTimeout);const q=this.value.trim();
  if(!q){clearSearch();return;}searchTimeout=setTimeout(()=>doSearch(q),450);
});
async function doSearch(q) {
  document.getElementById('search-section').style.display='block';
  const grid=document.getElementById('search-grid');grid.innerHTML='';
  try {
    const data=await tmdb('/search/multi',{query:q});
    const results=(data.results||[]).filter(r=>r.media_type!=='person'&&(r.poster_path||r.backdrop_path));
    if(!results.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">Nessun risultato.</div>';return;}
    results.slice(0,20).forEach(item=>{
      const type=item.media_type,poster=item.poster_path?`${IMG}/w342${item.poster_path}`:(item.backdrop_path?`${IMG}/w780${item.backdrop_path}`:''),name=item.title||item.name||'';
      const card=document.createElement('div');card.className='search-card';card.onclick=()=>openModal(item.id,type);
      card.innerHTML=poster?`<img src="${poster}" alt="${name}" loading="lazy"><div class="search-card-info"><div class="search-card-type">${type==='tv'?'📺 Serie':'🎬 Film'}</div><div class="search-card-title">${name}</div></div>`:`<div style="height:100%;display:flex;align-items:center;justify-content:center;padding:8px;font-size:0.75rem;color:#555;text-align:center">${name}</div>`;
      grid.appendChild(card);
    });
  } catch(e){grid.innerHTML='<div class="empty" style="grid-column:1/-1">Errore.</div>';}
}
function clearSearch(){document.getElementById('search-section').style.display='none';document.getElementById('searchInput').value='';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// ── Language selector ──
const LANGS={'it-IT':'🇮🇹 Italiano','en-US':'🇬🇧 English','fr-FR':'🇫🇷 Français','es-ES':'🇪🇸 Español','de-DE':'🇩🇪 Deutsch'};
function buildLangSelector() {
  const area=document.querySelector('.user-area');
  const sel=document.createElement('select');
  sel.style.cssText='background:#000;border:1px solid #333;border-radius:6px;color:#fff;font-family:DM Sans,sans-serif;font-size:0.78rem;padding:5px 10px;cursor:pointer;outline:none;';
  Object.entries(LANGS).forEach(([code,label])=>{const opt=document.createElement('option');opt.value=code;opt.textContent=label;if(code===currentLang)opt.selected=true;sel.appendChild(opt);});
  sel.onchange=()=>{currentLang=sel.value;localStorage.setItem(storageKey('lang'),currentLang);document.getElementById('sliders-container').innerHTML='';init();};
  area.insertBefore(sel,area.firstChild);
}

// ── INIT ──
async function init() {
  renderContinueWatching();fbLoadHistory();
  try{const m=await tmdb('/movie/popular');if(m.results?.[0])setHero(m.results[0],'movie');if(m.results?.length)buildSection('🎬 Film più popolari',m.results.slice(0,20),'movie');}catch(e){}
  try{const tv=await tmdb('/tv/popular');if(tv.results?.length)buildSection('📺 Serie TV più popolari',tv.results.slice(0,20),'tv');}catch(e){}
  try{const tr=await tmdb('/trending/all/week');const it=(tr.results||[]).filter(i=>i.media_type!=='person');if(it.length)buildSection('🔥 Trending questa settimana',it.slice(0,20),null);}catch(e){}
  try{const tm=await tmdb('/movie/top_rated');if(tm.results?.length)buildSection('⭐ Film più apprezzati',tm.results.slice(0,20),'movie');}catch(e){}
  try{const tt=await tmdb('/tv/top_rated');if(tt.results?.length)buildSection('⭐ Serie TV più apprezzate',tt.results.slice(0,20),'tv');}catch(e){}
  try{
    const gs=await tmdb('/genre/movie/list');
    for(const g of (gs.genres||[]).slice(0,4)){try{const gm=await tmdb('/discover/movie',{with_genres:g.id,sort_by:'popularity.desc'});if(gm.results?.length)buildSection(`🎭 ${g.name}`,gm.results.slice(0,20),'movie');}catch(e){}}
  }catch(e){}
}

window.scrollSlider=scrollSlider;window.openModal=openModal;window.closeModal=closeModal;
window.closeModalBtn=closeModalBtn;window.loadEpisodes=loadEpisodes;window.toggleMenu=toggleMenu;
window.removeContinue=removeContinue;window.clearSearch=clearSearch;window.logout=logout;

buildLangSelector();
init();
</script>
