<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MyStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

<header>
  <a class="logo" href="home.html">MYSTREAM</a>
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search movies and TV shows..." autocomplete="off">
  </div>
  <div class="user-area">
    <span class="username-badge" id="usernameDisplay"></span>
    <button class="logout-btn" onclick="logout()">Esci</button>
  </div>
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</header>

<nav class="navbar" id="main-nav">
  <button class="nav-btn active" onclick="setSection('home',this)">Home</button>
  <button class="nav-btn" onclick="setSection('movies',this)">Film</button>
  <button class="nav-btn" onclick="setSection('tv',this)">Serie TV</button>
  <div class="nav-genres-wrap" id="genres-wrap">
    <button class="nav-genres-btn" id="genres-btn" onclick="toggleGenresMenu()">
      Genres <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
    </button>
    <div class="genres-dropdown" id="genres-dropdown">
      <a href="#" onclick="setSection('action',null);closeGenresMenu();return false;">Action</a>
      <a href="#" onclick="setSection('adventure',null);closeGenresMenu();return false;">Adventure</a>
      <a href="#" onclick="setSection('animation',null);closeGenresMenu();return false;">Animation</a>
      <a href="#" onclick="setSection('comedy',null);closeGenresMenu();return false;">Comedy</a>
      <a href="#" onclick="setSection('crime',null);closeGenresMenu();return false;">Crime</a>
      <a href="#" onclick="setSection('documentary',null);closeGenresMenu();return false;">Documentary</a>
      <a href="#" onclick="setSection('drama',null);closeGenresMenu();return false;">Drama</a>
      <a href="#" onclick="setSection('family',null);closeGenresMenu();return false;">Family</a>
      <a href="#" onclick="setSection('fantasy',null);closeGenresMenu();return false;">Fantasy</a>
      <a href="#" onclick="setSection('history',null);closeGenresMenu();return false;">History</a>
      <a href="#" onclick="setSection('horror',null);closeGenresMenu();return false;">Horror</a>
      <a href="#" onclick="setSection('kids',null);closeGenresMenu();return false;">Kids</a>
      <a href="#" onclick="setSection('music',null);closeGenresMenu();return false;">Music</a>
      <a href="#" onclick="setSection('mystery',null);closeGenresMenu();return false;">Mystery</a>
      <a href="#" onclick="setSection('news',null);closeGenresMenu();return false;">News</a>
      <a href="#" onclick="setSection('reality',null);closeGenresMenu();return false;">Reality</a>
      <a href="#" onclick="setSection('romance',null);closeGenresMenu();return false;">Romance</a>
      <a href="#" onclick="setSection('scifi',null);closeGenresMenu();return false;">Sci-Fi & Fantasy</a>
      <a href="#" onclick="setSection('scifi_movie',null);closeGenresMenu();return false;">Science Fiction</a>
      <a href="#" onclick="setSection('soap',null);closeGenresMenu();return false;">Soap</a>
      <a href="#" onclick="setSection('thriller',null);closeGenresMenu();return false;">Thriller</a>
      <a href="#" onclick="setSection('tvmovie',null);closeGenresMenu();return false;">TV Movie</a>
      <a href="#" onclick="setSection('war',null);closeGenresMenu();return false;">War & Politics</a>
      <a href="#" onclick="setSection('western',null);closeGenresMenu();return false;">Western</a>
    </div>
  </div>
  <button class="nav-btn" onclick="setSection('action',this)">Azione</button>
  <button class="nav-btn" onclick="setSection('comedy',this)">Commedia</button>
  <button class="nav-btn" onclick="setSection('animation',this)">Cartoni</button>
  <button class="nav-btn" onclick="setSection('horror',this)">Horror</button>
  <button class="nav-btn" onclick="setSection('romance',this)">Romantici</button>
  <button class="nav-btn" onclick="setSection('scifi',this)">Fantascienza</button>
  <button class="nav-btn" onclick="setSection('thriller',this)">Thriller</button>
  <button class="nav-btn" onclick="setSection('documentary',this)">Documentari</button>
  <button class="nav-btn" onclick="setSection('family',this)">Famiglia</button>
  <button class="nav-btn" onclick="setSection('crime',this)">Crime</button>
</nav>

<div class="menu-overlay" id="menuOverlay"></div>

<nav class="navbar-mobile" id="navbarMobile">
  <div style="padding: 20px 16px 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <span style="font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--red); letter-spacing: 2px;">MYSTREAM</span>
    </div>
    <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px 16px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <span style="font-size: 1.2rem;">👤</span>
        <span style="font-size: 0.9rem; color: var(--text);" id="usernameDisplayMobile"></span>
      </div>
    </div>
    <div class="search-wrap" style="margin-top: 15px;">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search movies and TV shows..." autocomplete="off">
    </div>
  </div>
  
  <div style="flex: 1; overflow-y: auto; padding: 8px 0;">
    <button class="nav-btn active" data-section="home">🏠 Home</button>
    <button class="nav-btn" data-section="movies">🎬 Film</button>
    <button class="nav-btn" data-section="tv">📺 Serie TV</button>
    <button class="nav-btn" data-section="action">💥 Azione</button>
    <button class="nav-btn" data-section="comedy">😂 Commedia</button>
    <button class="nav-btn" data-section="animation">🎨 Cartoni</button>
    <button class="nav-btn" data-section="horror">👻 Horror</button>
    <button class="nav-btn" data-section="romance">❤️ Romantici</button>
    <button class="nav-btn" data-section="scifi">🚀 Fantascienza</button>
    <button class="nav-btn" data-section="thriller">🔪 Thriller</button>
    <button class="nav-btn" data-section="documentary">🎬 Documentari</button>
    <button class="nav-btn" data-section="family">👨‍👩‍👧 Famiglia</button>
    <button class="nav-btn" data-section="crime">🔫 Crime</button>
  </div>
  
  <div class="mobile-menu-footer">
    <div style="display: flex; justify-content: flex-start; margin-bottom: 16px;">
      <div id="mobile-lang-container" style="display: inline-block;"></div>
    </div>
    <button class="mobile-logout-btn" onclick="logout()">
      🚪 Logout
    </button>
  </div>
</nav>

<main>
  <div class="hero" id="hero">
    <img class="hero-img" id="hero-img" src="" alt="">
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="hero-badge" id="hero-badge">FEATURED</div>
      <div class="hero-title" id="hero-title">Loading...</div>
      <div class="hero-desc" id="hero-desc"></div>
      <div class="hero-actions">
        <a class="btn-play" id="hero-play" href="#"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> <span id="hero-play-label">Watch now</span></a>
        <button class="btn-info" id="hero-info"><span id="hero-info-label">More info</span></button>
      </div>
    </div>
  </div>

  <div class="section" id="cw-section" style="display:none">
    <div class="section-header"><span class="section-title" id="cw-title"></span></div>
    <div class="slider-wrap">
      <button class="arrow arrow-left" onclick="scrollSlider(this,-1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="slider" id="cw-slider"></div>
      <button class="arrow arrow-right" onclick="scrollSlider(this,1)"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>

  <div class="section" id="search-section">
    <div class="section-header">
      <span class="section-title" id="search-results-title">🔍 Search Results</span>
      <button onclick="clearSearch()" id="search-close-btn" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;text-decoration:underline;">✕ Close</button>
    </div>
    <div class="search-grid" id="search-grid"></div>
  </div>

  <div id="sliders-container"></div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div style="position:relative">
      <img class="modal-backdrop" id="modal-backdrop" src="" alt="">
      <div class="modal-gradient" style="top:calc(100% - 200px)"></div>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-tagline" id="modal-tagline"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-actions" id="modal-actions"></div>
      <div id="modal-seasons-wrap"></div>
    </div>
  </div>
</div>

<div class="card-popup" id="card-popup"></div>
<div class="toast" id="toast"></div>

<script type="module" src="js/home.js"></script>
</body>
</html>
