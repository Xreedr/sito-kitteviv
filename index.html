<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyStream — Accedi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" type="image/x-icon" href="/img/logo.jpg">   

</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="wrap">
    <div class="logo">KITTEVIV</div>
    <p class="tagline">Accesso privato &middot; Solo su invito</p>

    <div class="card">
      <h2>Bentornato/a</h2>
      <div class="field">
        <label>Username</label>
        <input type="text" id="u" placeholder="il tuo nome" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="p" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" onclick="doLogin()">Entra &rarr;</button>
      <label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:0.8rem;color:#757575;cursor:pointer;">
        <input type="checkbox" id="remember" style="accent-color:#e50914;width:15px;height:15px;cursor:pointer;">
        <span id="remember-label">Ricordami su questo dispositivo</span>
      </label>
      <div class="error" id="err">Username o password non corretti.</div>
    </div>

    <p class="note">Sito privato — accesso riservato.</p>
  </div>

  <script type="module" src="js/index.js"></script>
</body>
</html>
